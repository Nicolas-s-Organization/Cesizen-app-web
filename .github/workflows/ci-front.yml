name: CI Front

on:
  push:
    branches: [main, develop]
    tags: ['v*']               # release prod déclenchée par un tag git v*
  pull_request:
    branches: [main, develop]

env:
  # Nom de l'image GHCR (lowercase obligatoire pour le registry)
  IMAGE_NAME: ghcr.io/nicolas-s-organization/cesizen-app-web

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build (typecheck + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e:
    name: Tests E2E (Selenium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Chrome est préinstallé sur les runners ubuntu ; Selenium Manager récupère le driver.
      - run: npm run e2e
      - name: Upload des screenshots E2E
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/screenshots/
          if-no-files-found: ignore

  build-push:
    name: Build, scan & push image GHCR
    needs: [lint, build, e2e]
    # Le job tourne sur PR ET sur push (pour que Trivy bloque la PR avant le merge).
    # Le PUSH GHCR lui-même est conditionnel (voir étape "Push sur GHCR" plus bas) :
    # sur PR → on build + scan uniquement (pas de push). Sur push develop/main/tag → push.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # pour uploader le rapport SARIF Trivy dans l'onglet Security
    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Push sur une branche → :develop, :main (ou :chore-cd-front pour test)
            type=ref,event=branch
            # Tag git v1.2.3 → :1.2.3, :1.2, :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # :latest UNIQUEMENT sur les tags v* (= release prod)
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Tag SHA pour la traçabilité immuable (un commit = une image identifiable)
            type=sha,prefix=sha-,format=short

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # ─── 1. Build l'image LOCALEMENT (pas encore poussée sur GHCR) ────────
      # On charge dans le docker du runner pour pouvoir la scanner AVANT le push.
      # Le cache GHA est peuplé ici pour que l'étape de push à la fin soit instantanée.
      - name: Build local (pour scan, pas de push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: scan-target:latest
          # Bake l'URL de l'API dans le bundle Vite — DOIT être identique au build final
          # sinon on scanne une image différente de celle qu'on push.
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── 2. Trivy — rapport SARIF (informational, pour traçabilité) ──────
      # Remonté dans l'onglet Security GitHub. Cette étape ne bloque jamais.
      - name: Trivy — rapport HIGH+CRITICAL (SARIF pour Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:latest
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF dans l'onglet Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # ─── 3. Trivy — gate strict : bloque le push si CRITICAL corrigeable ──
      - name: Trivy — gate (échec si CRITICAL corrigeable)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:latest
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      # ─── 4. Push sur GHCR — UNIQUEMENT sur push develop/main/tag (pas sur PR) ──
      # ET uniquement si toutes les étapes précédentes (dont Trivy) ont passé.
      # Le build se rejoue mais c'est instantané grâce au cache GHA peuplé étape 1.
      - name: Push sur GHCR (uniquement si scan OK et push event sur dev/main/tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
