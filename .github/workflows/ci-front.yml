name: CI Front

on:
  push:
    branches: [main, develop]
    tags: ['v*']               # release prod déclenchée par un tag git v*
  pull_request:
    branches: [main, develop]

env:
  # Nom de l'image GHCR (lowercase obligatoire pour le registry)
  IMAGE_NAME: ghcr.io/nicolas-s-organization/cesizen-app-web

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build (typecheck + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e:
    name: Tests E2E (Selenium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Chrome est préinstallé sur les runners ubuntu ; Selenium Manager récupère le driver.
      - run: npm run e2e
      - name: Upload des screenshots E2E
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/screenshots/
          if-no-files-found: ignore

  build-push:
    name: Build & push image GHCR
    needs: [lint, build, e2e]
    # Push image sur develop/main OU sur tag git v* (= release prod). Jamais sur les PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Push sur une branche → :develop, :main (ou :chore-cd-front pour test)
            type=ref,event=branch
            # Tag git v1.2.3 → :1.2.3, :1.2, :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # :latest UNIQUEMENT sur les tags v* (= release prod)
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Tag SHA pour la traçabilité immuable (un commit = une image identifiable)
            type=sha,prefix=sha-,format=short

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake l'URL de l'API dans le bundle Vite (chemin relatif : la même image
          # fonctionne pour staging ET prod car axios appelle /api sur le host courant).
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy:
    name: Scan d'image (Trivy)
    needs: build-push
    # Même condition que build-push : on scan uniquement les images réellement poussées
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read           # pour pull l'image privée GHCR
      security-events: write   # pour uploader le SARIF dans l'onglet Security
    steps:
      - uses: actions/checkout@v4

      - name: Connexion à GHCR (pull image privée)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcul du tag d'image à scanner
        id: scan
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "tag=develop" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=main" >> "$GITHUB_OUTPUT"
          else
            # tag git v* → on scan :latest (= le tag que prod va consommer)
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      # Étape 1/3 : rapport HIGH+CRITICAL en SARIF, NON bloquant (pour visibilité)
      - name: Scan exhaustif (HIGH+CRITICAL, informational)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.scan.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: sarif
          output: trivy-results.sarif

      # Étape 2/3 : remonte le rapport dans l'onglet Security du repo GitHub
      - name: Upload SARIF dans l'onglet Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ steps.scan.outputs.tag }}

      # Étape 3/3 : gate strict — échoue seulement sur CRITICAL avec fix dispo
      - name: Gate (échec si CRITICAL corrigeable)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.scan.outputs.tag }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
