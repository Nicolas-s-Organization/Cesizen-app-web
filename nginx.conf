server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback : si l'URL ne matche pas un fichier, on renvoie index.html.
    # Indispensable pour React Router (sinon un refresh sur /users → 404).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashe les noms d'assets (cache-busting) → cache long sans risque.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html ne doit PAS être mis en cache (sinon les màj n'arrivent pas)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
